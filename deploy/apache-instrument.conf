# Sisipkan di vhost psimkg.bmkg.go.id SEBELUM ProxyPass / ke portal :3001
#
# Login admin memakai /instrument/admin/session (Next :3011), BUKAN /instrument/api/*
# agar cookie sesi di-set oleh proses yang sama dengan middleware auth.
#
# PENTING — CSP portal (script-src + nonce) memblokir inline script Next.js.
# Akibatnya: jam TopBar kosong, login admin tidak jalan, "Connection closed".
# Longgarkan / unset CSP khusus path /instrument (lihat blok di bawah).

ProxyPass        /instrument/api/ http://127.0.0.1:8011/
ProxyPassReverse /instrument/api/ http://127.0.0.1:8011/
ProxyPass        /instrument      http://127.0.0.1:3011/instrument
ProxyPassReverse /instrument      http://127.0.0.1:3011/instrument

# --- CSP untuk Next.js di /instrument ---
# Opsi A (disarankan): tandai request /instrument lalu set CSP terpisah di vhost.
# Tambahkan di VirtualHost HTTPS (bersama header keamanan portal):
#
#   SetEnvIf Request_URI "^/instrument" instrument_path
#   # CSP portal yang sudah ada — tambahkan env=!instrument_path
#   # Header always set Content-Security-Policy "…portal…" env=!embed_path env=!instrument_path
#
#   Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" env=instrument_path
#
# Opsi B: unset CSP yang diwariskan, lalu set ulang hanya untuk /instrument:
<IfModule mod_headers.c>
  <LocationMatch "^/instrument">
    Header unset Content-Security-Policy
    Header always unset Content-Security-Policy
    Header set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
  </LocationMatch>
</IfModule>
