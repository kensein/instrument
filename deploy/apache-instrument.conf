# Sisipkan di vhost psimkg.bmkg.go.id SEBELUM ProxyPass / ke portal :3001
#
# Login admin memakai /instrument/admin/session (Next :3011), BUKAN /instrument/api/*
# agar cookie sesi di-set oleh proses yang sama dengan proxy (auth guard).

ProxyPass        /instrument/api/ http://127.0.0.1:8011/
ProxyPassReverse /instrument/api/ http://127.0.0.1:8011/
ProxyPass        /instrument      http://127.0.0.1:3011/instrument
ProxyPassReverse /instrument      http://127.0.0.1:3011/instrument

# =====================================================================
# CSP — WAJIB. Portal memakai CSP ketat (script-src 'self' [+ nonce dari
# Cloudflare]). Itu memblokir inline script Next.js -> jam TopBar kosong,
# login admin mati, "Connection closed".
#
# Aplikasi Next kini MENGIRIM CSP-nya sendiri dengan nonce (src/proxy.ts).
# Apache HANYA perlu BERHENTI menimpa CSP di path /instrument, biar header
# CSP dari Next diteruskan apa adanya.
#
# 1) Pada baris CSP portal yang sudah ada, tambахkan env=!instrument_path
#    supaya tidak berlaku untuk /instrument. Contoh:
#
#      SetEnvIf Request_URI "^/instrument" instrument_path
#      Header always set Content-Security-Policy "…CSP-portal…" env=!embed_path env=!instrument_path
#
# 2) Pastikan TIDAK ada `Header set Content-Security-Policy` lain yang
#    mengenai /instrument. Jangan set CSP statis untuk /instrument.
#
# Jika CSP portal di-set di file global (mis. conf-available/security.conf),
# override eksplisit di dalam vhost (unset saja, biarkan Next yang mengatur):
#
<IfModule mod_headers.c>
  <LocationMatch "^/instrument">
    Header always unset Content-Security-Policy
    Header unset Content-Security-Policy
  </LocationMatch>
</IfModule>
#
# Catatan Cloudflare: fitur "JavaScript Detections" / Bot Fight Mode menyuntik
# script inline + menambah nonce ke CSP. Karena Next memakai nonce + strict-dynamic,
# ini tetap kompatibel. Jika masih diblokir, nonaktifkan "JavaScript Detections"
# (Security > Bots) untuk domain ini.
